version: "3.9"

services:

  # ======================================
  # Spark Master (imagem oficial)
  # ======================================
  spark-master:
    image: eng-spark:3.5
    container_name: spark-master
    hostname: spark-master
    entrypoint: [
      "/opt/spark/bin/spark-class",
      "org.apache.spark.deploy.master.Master",
      "--host", "spark-master",
      "--port", "7077",
      "--webui-port", "8080"
    ]
    environment:
      - PYTHONPATH=/opt/spark/jobs/app:/opt/spark/jobs/app/
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ${APP_JOBS_PATH}:/opt/spark/jobs
      - ${APP_RESOURCES_PATH}:/opt/spark/resources
      - ${APP_STORAGE_PATH}:/opt/spark/storage
      - ${APP_LOG_PATH}:/opt/spark/logs/events
      - ${APP_METRICS_PATH}:/opt/spark/metrics
    networks:
      - spark-net


  # ======================================
  # Spark Workers
  # ======================================
  spark-worker-1:
    image: eng-spark:3.5
    container_name: spark-worker-1
    hostname: spark-worker-1
    entrypoint: [
      "/opt/spark/bin/spark-class",
      "org.apache.spark.deploy.worker.Worker",
      "spark://spark-master:7077"
    ]
    environment:
      - SPARK_WORKER_HOST=spark-worker-1
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=3g
    ports:
      - "8081:8081"
    volumes:
      - ${APP_JOBS_PATH}:/opt/spark/jobs
      - ${APP_RESOURCES_PATH}:/opt/spark/resources
      - ${APP_STORAGE_PATH}:/opt/spark/storage
      - ${APP_LOG_PATH}:/opt/spark/logs/events
      - ${APP_METRICS_PATH}:/opt/spark/metrics
    depends_on:
      - spark-master
    networks:
      - spark-net

  spark-worker-2:
    image: eng-spark:3.5
    container_name: spark-worker-2
    hostname: spark-worker-2
    entrypoint: [
      "/opt/spark/bin/spark-class",
      "org.apache.spark.deploy.worker.Worker",
      "spark://spark-master:7077"
    ]
    environment:
      - SPARK_WORKER_HOST=spark-worker-2
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=3g
    ports:
      - "8082:8081"
    volumes:
      - ${APP_JOBS_PATH}:/opt/spark/jobs
      - ${APP_RESOURCES_PATH}:/opt/spark/resources
      - ${APP_STORAGE_PATH}:/opt/spark/storage
      - ${APP_LOG_PATH}:/opt/spark/logs/events
      - ${APP_METRICS_PATH}:/opt/spark/metrics
    depends_on:
      - spark-master
    networks:
      - spark-net

  spark-worker-3:
    image: eng-spark:3.5
    container_name: spark-worker-3
    hostname: spark-worker-3
    entrypoint: [
      "/opt/spark/bin/spark-class",
      "org.apache.spark.deploy.worker.Worker",
      "spark://spark-master:7077"
    ]
    environment:
      - SPARK_WORKER_HOST=spark-worker-3
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=3g
    ports:
      - "8083:8081"
    volumes:
      - ${APP_JOBS_PATH}:/opt/spark/jobs
      - ${APP_RESOURCES_PATH}:/opt/spark/resources
      - ${APP_STORAGE_PATH}:/opt/spark/storage
      - ${APP_LOG_PATH}:/opt/spark/logs/events
      - ${APP_METRICS_PATH}:/opt/spark/metrics
    depends_on:
      - spark-master
    networks:
      - spark-net


  # ======================================
  # Spark History Server
  # ======================================
  spark-history-server:
    image: eng-spark:3.5
    container_name: spark-history-server
    hostname: spark-history-server
    entrypoint: [
      "/opt/spark/bin/spark-class",
      "org.apache.spark.deploy.history.HistoryServer"
    ]
    environment:
      # History NÃO é worker → remove essa linha
      # - SPARK_WORKER_HOST=spark-history-server

      # Usa o mesmo diretório dos logs, com prefixo file:
      - SPARK_HISTORY_OPTS=-Dspark.history.fs.logDirectory=file:/opt/spark/logs/events
    ports:
      - "18080:18080"
    volumes:
      - ${APP_LOG_PATH}:/opt/spark/logs/events
      - ${APP_METRICS_PATH}:/opt/spark/metrics
    depends_on:
      - spark-master
      - spark-worker-1
      - spark-worker-2
      - spark-worker-3
    networks:
      - spark-net


networks:
  spark-net:
    driver: bridge
